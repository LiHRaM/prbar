name: ci

on:
  push:
    branches: [main]
    # Doc-only direct-to-main pushes (the admin-override escape hatch
    # described in CLAUDE.md) don't need CI. PRs still always run CI
    # regardless of paths so a doc-only PR's required check still
    # reports — no merge-block surprise.
    paths-ignore:
      - CLAUDE.md
      - PLAN.md
      - README.md
      - docs/**
  pull_request:

# Cancel any in-flight CI run for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # bin/version uses git describe + rev-list count; the shallow
          # clone GitHub uses by default would skew the build number.
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build (Debug)
        run: ./bin/build

      # Package the .app as a single zip so the bundle's structure,
      # symlinks, and permissions survive the artifact round-trip
      # (upload-artifact re-zips a raw directory and mangles bundles).
      # Uploaded before Test so a red test run still leaves a downloadable
      # build. The app is ad-hoc-signed (no Developer ID) — Gatekeeper
      # quarantines it on download; right-click -> Open, or run
      # `xattr -dr com.apple.quarantine PRBar.app` after unzipping.
      - name: Package app
        run: ditto -c -k --sequesterRsrc --keepParent build/Debug/PRBar.app PRBar-debug.app.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: PRBar-debug-app
          path: PRBar-debug.app.zip
          if-no-files-found: error

      - name: Test
        run: ./bin/test
